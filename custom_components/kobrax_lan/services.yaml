change_print_speed_mode:
  fields:
    config_entry:
      required: false
      selector:
        config_entry:
          integration: kobrax_lan
    device_id:
      required: false
      selector:
        text:
    printer_id:
      required: false
      selector:
        text:
    speed_mode:
      required: true
      selector:
        number:
          min: 1
          max: 3
          step: 1
          mode: box

